<!doctype html>
<html>
<head><style>html,body{margin:0;padding:0;background:#0A2E5C;overflow:hidden;}</style></head>
<body>
<svg width="880" height="880" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B2E5E"/>
      <stop offset="0.55" stop-color="#12599C"/>
      <stop offset="1" stop-color="#1AA0C9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#3FA9E0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3FA9E0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sphere" cx="0.35" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#8FE3FF"/>
      <stop offset="0.45" stop-color="#2E9BD6"/>
      <stop offset="1" stop-color="#0E4E86"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00142E" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00142E" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- fondo solido, esquinas cuadradas, sin transparencia -->
  <rect x="0" y="0" width="440" height="440" fill="url(#bg)"/>
  <rect x="0" y="0" width="440" height="440" fill="url(#glow)"/>

  <!-- patron sutil de puntos (dato/IA) -->
  <g fill="#FFFFFF" opacity="0.10">
    <circle cx="46" cy="46" r="2.6"/><circle cx="70" cy="46" r="2.6"/><circle cx="46" cy="70" r="2.6"/>
    <circle cx="394" cy="386" r="2.6"/><circle cx="370" cy="386" r="2.6"/><circle cx="394" cy="362" r="2.6"/>
    <circle cx="394" cy="46" r="2.6"/><circle cx="370" cy="46" r="2.6"/>
    <circle cx="46" cy="386" r="2.6"/><circle cx="46" cy="362" r="2.6"/>
  </g>

  <!-- sombra del globo -->
  <ellipse cx="220" cy="330" rx="120" ry="26" fill="url(#shadow)"/>

  <!-- anillo orbita -->
  <ellipse cx="220" cy="205" rx="158" ry="60" fill="none" stroke="url(#ring)" stroke-width="4" transform="rotate(-16 220 205)"/>

  <!-- globo -->
  <circle cx="220" cy="205" r="118" fill="url(#sphere)"/>

  <!-- continentes estilizados -->
  <g fill="#2FB566" opacity="0.92">
    <path d="M162,158 q18,-26 46,-22 q20,3 22,20 q2,14 -12,20 q-18,8 -34,-2 q-18,-8 -22,-16 z"/>
    <path d="M150,206 q26,-14 48,2 q14,10 4,26 q-10,16 -32,14 q-24,-2 -28,-22 q-2,-12 8,-20 z"/>
    <path d="M256,150 q22,-10 38,6 q12,12 0,26 q-12,14 -32,8 q-18,-6 -18,-22 q0,-10 12,-18 z"/>
    <path d="M206,252 q18,-12 34,0 q10,8 2,18 q-10,12 -28,8 q-16,-4 -14,-16 q1,-6 6,-10 z"/>
    <path d="M262,214 q16,-10 28,2 q8,8 0,18 q-10,10 -24,4 q-10,-4 -10,-14 q0,-6 6,-10 z"/>
  </g>

  <!-- brillo glossy -->
  <ellipse cx="180" cy="150" rx="58" ry="34" fill="#FFFFFF" opacity="0.30" transform="rotate(-24 180 150)"/>

  <!-- avion sobre la orbita (vista superior, silueta reconocible) -->
  <g transform="translate(300,148) rotate(-56) scale(2.35)">
    <path d="M21,16 v-2 l-8-5 V3.5 a1.5,1.5 0 0 0 -3,0 V9 l-8,5 v2 l8-2.5 V19 l-2.5,1.5 V22 l3.5-1 3.5,1 v-1.5 L13,19 v-6.5 z" fill="#FFFFFF"/>
  </g>

  <!-- insignia de verificacion -->
  <circle cx="316" cy="286" r="34" fill="#0A2E5E"/>
  <circle cx="316" cy="286" r="27" fill="#2ECC71"/>
  <path d="M301,287 l10,10 l22,-24" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</body>
</html>
